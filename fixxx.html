<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Ucapan Hari Raya</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top, #1f3b4d, #0f2027);
  color: white;
  text-align: center;
  overflow: hidden;
}

/* ORNAMEN BULAN */
.moon {
  position: absolute;
  top: 60px;
  right: 80px;
  width: 100px;
  height: 100px;
  background: radial-gradient(circle, #fff, #ddd);
  border-radius: 50%;
  box-shadow: 0 0 40px rgba(255,255,255,0.5);
  opacity: 0.8;
}

/* BINTANG */
.stars span {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  animation: blink 2s infinite;
}

@keyframes blink {
  50% { opacity: 0.3; }
}

/* PARTIKEL HALUS */
.sparkle {
  position: absolute;
  width: 4px;
  height: 4px;
  background: #ffffff;
  border-radius: 50%;
  opacity: 0.5;
  animation: float 6s linear infinite;
}

@keyframes float {
  from { transform: translateY(100vh); opacity: 0; }
  to { transform: translateY(-10vh); opacity: 1; }
}

/* CARD */
.card {
  position: relative;
  z-index: 2;
  background: rgba(255,255,255,0.08);
  padding: 45px 35px;
  border-radius: 25px;
  backdrop-filter: blur(15px);
  box-shadow: 0 0 40px rgba(0,0,0,0.5);
  max-width: 420px;
  margin: 120px auto;
  animation: fadeIn 2s ease;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(40px);}
  to {opacity: 1; transform: translateY(0);}
}

h1 {
  font-size: 32px;
  margin-bottom: 15px;
  color: #fff;
  text-shadow: 0 0 15px rgba(0,198,255,0.8);
}

p {
  font-size: 17px;
  line-height: 1.7;
  opacity: 0.9;
}

/* POPUP */
.popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  visibility: hidden;
  transition: 0.4s;
  z-index: 3;
}

.popup.active {
  opacity: 1;
  visibility: visible;
}

.popup-box {
  background: white;
  color: #333;
  padding: 30px;
  border-radius: 18px;
  width: 280px;
  animation: pop 0.4s ease;
}

@keyframes pop {
  from { transform: scale(0.7);}
  to { transform: scale(1);}
}

.btn {
  margin-top: 15px;
  padding: 8px 15px;
  border: none;
  background: #00c6ff;
  color: white;
  border-radius: 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- Musik -->
<audio autoplay loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_7b1a9f4d6f.mp3">
</audio>

<div class="moon"></div>
<div class="stars"></div>

<div class="card">
  <h1>🌙 Selamat Hari Raya</h1>
  <p>
    Taqabbalallahu minna wa minkum 🤍<br><br>
    Semoga di hari yang suci ini, hati kembali ringan,
    langkah terasa tenang, dan kebahagiaan datang dengan cara yang sederhana.
  </p>
</div>

<!-- Popup -->
<div class="popup" id="popup">
  <div class="popup-box">
    <p id="text"></p>
    <button class="btn" onclick="next()">Lanjut</button>
  </div>
</div>

<script>
// bintang
const stars = document.querySelector('.stars');
for (let i = 0; i < 60; i++) {
  let s = document.createElement('span');
  s.style.top = Math.random() * 100 + "%";
  s.style.left = Math.random() * 100 + "%";
  stars.appendChild(s);
}

// sparkle
for (let i = 0; i < 20; i++) {
  let sp = document.createElement('div');
  sp.className = "sparkle";
  sp.style.left = Math.random() * 100 + "%";
  sp.style.animationDuration = (4 + Math.random() * 4) + "s";
  document.body.appendChild(sp);
}

// pesan
const messages = [
  "Di hari yang penuh makna ini...",
  "Semoga semua yang baik selalu menghampiri...",
  "Dan setiap langkah dipenuhi hal-hal yang menyenangkan...",
  "Kadang, kebahagiaan datang dari hal-hal sederhana...",
  "Seperti momen tenang, atau perasaan yang tiba-tiba jadi hangat...",
  "Tanpa perlu alasan yang jelas...",
  "Semoga hari-harimu selalu dipenuhi hal-hal seperti itu...",
  "Dan semoga senyuman itu selalu ada 🙂"
];

let i = 0;
const popup = document.getElementById("popup");
const text = document.getElementById("text");

function show() {
  popup.classList.add("active");
  text.innerText = messages[i];
}

function next() {
  i++;
  if (i < messages.length) {
    text.innerText = messages[i];
  } else {
    text.innerHTML =
      "<b>Untuk Nabira Mutiara dan Keluarga 🤍</b><br><br>" +
      "Mohon maaf lahir dan batin 🙏<br><br>" +
      "Semoga hari raya ini membawa kebahagiaan, ketenangan, dan banyak hal baik yang tak terduga.<br><br>" +
      "jangan lupa salam untuk mamak sama bapak wkwkwk 😄";
    document.querySelector(".btn").innerText = "Selesai";
  }
}

setTimeout(show, 3000);
</script>

</body>
</html>
